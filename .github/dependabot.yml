version: 2

# Default pattern: 3-group (security + minor-patch + majors-individual).
#   1. <eco>-security    → all vulnerability fixes (urgent)
#   2. <eco>-minor-patch → safe semver bumps grouped together
#   3. (majors stay individual — breaking changes get isolated review;
#      a v6→v7 upgrade can't take down a grouped PR's CI and block
#      safe patches inside it)
#
# `open-pull-requests-limit: 2` is a HARD CAP. If grouping ever permits
# more than 2 PRs per ecosystem, the limit kicks in.
#
# ALTERNATIVE (FULL grouping, dormant repos):
# For repos you batch-review-and-pray (no active iteration), you may
# prefer "true weekly digest" — collapse everything into 2 groups per
# ecosystem (security + all-versions, no update-types filter). See
# docs/SECURITY-OPERATIONS.md §5.2 for that pattern.

updates:
  # GitHub Actions (always safe to enable; no language-specific deps)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      gh-actions:
        patterns: ["*"]


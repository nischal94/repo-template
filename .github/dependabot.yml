version: 2

# Dependabot configuration for the template. Default config:
#   - github-actions: monthly, grouped — single PR per month with all updates
#   - language ecosystems (pip/npm/docker): commented out, opt-in per repo
#
# When using this template for a real project, uncomment the matching
# ecosystem block. The `groups:` section collapses bursts: instead of
# 22 separate security PRs, you get ONE grouped weekly PR per ecosystem.
#
# WARNING: enabling on a stale repo will trigger an initial burst of
# version-update PRs. The grouping below collapses them, but expect
# 1-2 grouped PRs the first week.

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      gh-actions:
        applies-to: version-updates
        patterns: ["*"]


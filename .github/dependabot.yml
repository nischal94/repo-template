version: 2

# FULL grouping baseline — every Dependabot update lands as a grouped PR,
# never an individual PR. Two groups per ecosystem:
#   1. <ecosystem>-security  → all vulnerability fixes
#   2. <ecosystem>-versions  → all version bumps including majors
#
# This is "true weekly digest" mode — burst-proof regardless of how
# many deps are stale when you enable Dependabot. Trade-off: major-version
# diffs share a PR with minor/patch (review each embedded changelog).
#
# `open-pull-requests-limit: 2` is a hard cap independent of grouping —
# protects against config drift.
#
# Reference: docs/SECURITY-OPERATIONS.md §5

updates:
  # GitHub Actions (always safe to enable; no language-specific deps)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      gh-actions:
        patterns: ["*"]


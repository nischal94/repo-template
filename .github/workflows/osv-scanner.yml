name: OSV-Scanner

# Google's OSV-Scanner: cross-ecosystem vulnerability scan against the
# OSV database. Complementary to GitHub's native Dependabot — different
# advisory source, broader ecosystem coverage (npm, pip, Go, Rust,
# Maven, etc).
#
# Runs on PRs that touch dependency manifests + weekly catch-all.

on:
  pull_request:
    paths:
      - "**/package.json"
      - "**/package-lock.json"
      - "**/pnpm-lock.yaml"
      - "**/yarn.lock"
      - "**/requirements*.txt"
      - "**/pyproject.toml"
      - "**/uv.lock"
      - "**/Pipfile.lock"
      - "**/poetry.lock"
      - "**/go.mod"
      - "**/go.sum"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "**/Gemfile.lock"
      - "**/composer.lock"
  push:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1"   # Mondays 07:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v1.9.0
    with:
      scan-args: |-
        --recursive
        --skip-git
        ./

name: ci-node
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      applies: ${{ steps.check.outputs.applies }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - id: check
        run: |
          if [ -f .github/stacks.yml ]; then
            if yq '.stacks[] | select(.kind == "node")' .github/stacks.yml > /dev/null; then
              echo "applies=true" >> "$GITHUB_OUTPUT"
            else
              echo "applies=false" >> "$GITHUB_OUTPUT"
            fi
          elif [ -f package.json ]; then
            echo "applies=true" >> "$GITHUB_OUTPUT"
          else
            echo "applies=false" >> "$GITHUB_OUTPUT"
          fi
  ci:
    needs: detect
    if: needs.detect.outputs.applies == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: block
          allowed-endpoints: >
            registry.npmjs.org:443
            registry.yarnpkg.com:443
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      # Detect which lockfile (if any) is committed. actions/setup-node's
      # `cache:` input hard-fails when set to a manager whose lockfile is
      # absent, so greenfield Node projects (no lockfile yet committed)
      # would fail their first CI run with "Dependencies lock file is not
      # found". Setting `cache:` only when a matching lockfile exists is
      # the documented escape hatch.
      - id: lockfile
        run: |
          if [ -f package-lock.json ]; then
            echo "manager=npm" >> "$GITHUB_OUTPUT"
          elif [ -f pnpm-lock.yaml ]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ]; then
            echo "manager=yarn" >> "$GITHUB_OUTPUT"
          else
            echo "manager=" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: ".nvmrc"
          cache: ${{ steps.lockfile.outputs.manager }}
      - name: Run ci-node.sh
        run: bash .github/scripts/ci-node.sh

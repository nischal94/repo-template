name: scorecard
on:
  branch_protection_rule:
  schedule:
    - cron: "0 13 * * 1"
  push:
    branches: [main]
permissions:
  contents: read
  security-events: write
  id-token: write
  actions: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Findings still surface in the GitHub Security tab via the SARIF
          # upload below — publishing to api.scorecard.dev is opt-in and
          # currently rejects this workflow shape, causing the job to exit 1
          # on every push. Re-enable once the upstream constraints are met.
          publish_results: false
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5
      - uses: github/codeql-action/upload-sarif@80cb6b56b93de3e779c7d476d9100d06fb87c877 # codeql-bundle-v2.23.2
        with:
          sarif_file: results.sarif

name: Scorecard supply-chain security

# OpenSSF Scorecard — automated audit of 18+ supply-chain best practices
# (branch protection, code review, signed releases, dependency updates,
# pinned dependencies, token permissions, etc).
#
# Runs weekly + on push to main + on workflow changes. Results land in
# Security → Code scanning alerts AND can be displayed as a public
# badge in README:
#
#   [![OpenSSF Scorecard](https://api.securityscorecards.dev/projects/github.com/<owner>/<repo>/badge)](https://securityscorecards.dev/viewer/?uri=github.com/<owner>/<repo>)

on:
  push:
    branches: [main]
  schedule:
    - cron: "30 6 * * 1"   # Mondays 06:30 UTC
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Run analysis
        uses: ossf/scorecard-action@v2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5
      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: scorecard

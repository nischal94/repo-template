name: Claude Code

# AI code review via Claude. Triggered by `@claude` mentions in issues,
# PR reviews, and PR review comments — never on every PR (would burn
# API budget).
#
# REQUIRED SECRET: ANTHROPIC_API_KEY
#   gh secret set ANTHROPIC_API_KEY -R <owner>/<repo>
#
# Without the secret, the workflow exists but won't fire.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Trust boundary: this workflow grants contents/pull-requests/issues/
    # id-token: write on a public repo, triggered by `@claude` mentions in
    # user-controlled bodies. WITHOUT the author_association gate, any
    # GitHub user can comment `@claude` on an issue/PR and the workflow
    # would fire with the workflow's full permissions. The anthropics
    # action has its own auth/quota controls, but they're at API-call
    # time — by that point the workflow's GITHUB_TOKEN already exists.
    #
    # Gate on author_association: only OWNER or COLLABORATOR can trigger.
    # OWNER covers the solo-account state today. COLLABORATOR covers the
    # later "I added a second trusted person" state without a doc update.
    # NEITHER covers public commenters (CONTRIBUTOR, FIRST_TIME_CONTRIBUTOR,
    # MANNEQUIN, MEMBER, NONE).
    #
    # author_association lives on a different field per event:
    #   issue_comment / pull_request_review_comment → .comment.author_association
    #   pull_request_review                         → .review.author_association
    #   issues                                      → .issue.author_association
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && (github.event.review.author_association == 'OWNER' || github.event.review.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) && (github.event.issue.author_association == 'OWNER' || github.event.issue.author_association == 'COLLABORATOR'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Run Claude Code
        uses: anthropics/claude-code-action@2703d6e89559c31037b8083eff3cc5ba56502f1e # v1.0.119
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

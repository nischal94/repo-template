name: ci-e2e
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      applies: ${{ steps.check.outputs.applies }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - id: check
        run: |
          if [ -f .github/stacks.yml ] && yq '.stacks[] | select(.kind == "e2e")' .github/stacks.yml > /dev/null; then
            echo "applies=true" >> "$GITHUB_OUTPUT"
          elif [ -f playwright.config.ts ] || [ -f playwright.config.js ] \
               || [ -f cypress.config.ts ] || [ -f cypress.config.js ]; then
            echo "applies=true" >> "$GITHUB_OUTPUT"
          else
            echo "applies=false" >> "$GITHUB_OUTPUT"
          fi
  ci:
    needs: detect
    if: needs.detect.outputs.applies == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: block
          allowed-endpoints: >
            registry.npmjs.org:443
            playwright.azureedge.net:443
            cdn.playwright.dev:443
            cdn.cypress.io:443
            azure.archive.ubuntu.com:80
            azure.archive.ubuntu.com:443
            archive.ubuntu.com:80
            security.ubuntu.com:80
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - name: Run ci-e2e.sh
        run: bash .github/scripts/ci-e2e.sh

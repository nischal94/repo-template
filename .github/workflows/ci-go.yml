name: ci-go
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      applies: ${{ steps.check.outputs.applies }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - id: check
        run: |
          if [ -f .github/stacks.yml ] && yq '.stacks[] | select(.kind == "go")' .github/stacks.yml > /dev/null; then
            echo "applies=true" >> "$GITHUB_OUTPUT"
          elif [ -f go.mod ]; then
            echo "applies=true" >> "$GITHUB_OUTPUT"
          else
            echo "applies=false" >> "$GITHUB_OUTPUT"
          fi
  ci:
    needs: detect
    if: needs.detect.outputs.applies == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: block
          allowed-endpoints: >
            proxy.golang.org:443
            sum.golang.org:443
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            storage.googleapis.com:443
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: ".go-version"
          cache: true
      - name: Run ci-go.sh
        run: bash .github/scripts/ci-go.sh

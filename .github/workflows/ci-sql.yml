name: ci-sql
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      applies: ${{ steps.check.outputs.applies }}
      paths: ${{ steps.check.outputs.paths }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - id: check
        run: |
          set -euo pipefail
          if [ -f .github/stacks.yml ]; then
            paths_json=$(yq -o=json -I=0 '[.stacks[] | select(.kind == "sql") | (.path // ".") | select(. != "")] | unique' .github/stacks.yml)
            if [ "$paths_json" = "[]" ]; then
              echo "applies=false" >> "$GITHUB_OUTPUT"
            else
              echo "applies=true" >> "$GITHUB_OUTPUT"
              echo "paths=$paths_json" >> "$GITHUB_OUTPUT"
            fi
          elif [ -d migrations ] || find . -maxdepth 3 -name "*.sql" -not -path "./.git/*" | head -1 | grep -q .; then
            echo "applies=true" >> "$GITHUB_OUTPUT"
            echo 'paths=["."]' >> "$GITHUB_OUTPUT"
          else
            echo "applies=false" >> "$GITHUB_OUTPUT"
          fi
  ci:
    needs: detect
    if: needs.detect.outputs.applies == 'true'
    runs-on: ubuntu-latest
    services:
      # ONE Postgres instance per job, shared across all stack paths.
      # Most monorepos run a single backing Postgres in production, so
      # sharing the test DB matches the deployment shape. If a project
      # genuinely needs Postgres-per-service for testing (rare), split
      # into separate repos.
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: test
      PGPASSWORD: test
      PGDATABASE: test
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            azure.archive.ubuntu.com:80
            azure.archive.ubuntu.com:443
            archive.ubuntu.com:80
            security.ubuntu.com:80
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - name: Install pgTAP tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client libtap-parser-sourcehandler-pgtap-perl
      - name: Run ci-sql.sh per stack path
        # Postgres service is shared across all paths (see services:
        # comment above). Each path's migrations apply against the
        # same DB sequentially in the order listed in stacks.yml.
        # If migrations between services conflict (e.g., two services
        # both define a `users` table), the run will fail — that's a
        # design signal that the services should be split.
        env:
          PATHS_JSON: ${{ needs.detect.outputs.paths }}
        run: |
          set -uo pipefail
          mapfile -t PATHS < <(jq -r '.[]' <<<"$PATHS_JSON")
          if [ "${#PATHS[@]}" -eq 0 ]; then
            echo "::error::ci-sql: paths output was empty"
            exit 1
          fi
          FAILED=()
          for p in "${PATHS[@]}"; do
            echo "::group::ci-sql.sh at $p"
            if (cd "$p" && bash "$GITHUB_WORKSPACE/.github/scripts/ci-sql.sh"); then
              echo "::endgroup::"
            else
              echo "::endgroup::"
              echo "::error::ci-sql.sh failed at path: $p"
              FAILED+=("$p")
            fi
          done
          if [ "${#FAILED[@]}" -gt 0 ]; then
            echo "::error::ci-sql failed at ${#FAILED[@]} path(s): ${FAILED[*]}"
            echo "::error::If migrations between services collide (e.g. two services both define a 'users' table) the migration error will surface above. The Postgres service container is SHARED across all stack paths in this workflow — see the services: comment above for why. If your services need genuinely isolated databases for testing, split into separate repos OR use schema-per-service in your migrations (CREATE SCHEMA + SET search_path)."
            exit 1
          fi

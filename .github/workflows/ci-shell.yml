name: ci-shell
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      applies: ${{ steps.check.outputs.applies }}
      paths: ${{ steps.check.outputs.paths }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      # Per spec §4.4: shell triggers only when shell is the PRIMARY language
      # OR when stacks.yml explicitly opts in.
      - id: check
        run: |
          set -euo pipefail
          if [ -f .github/stacks.yml ]; then
            paths_json=$(yq -o=json -I=0 '[.stacks[] | select(.kind == "shell") | (.path // ".") | select(. != "")] | unique' .github/stacks.yml)
            if [ "$paths_json" = "[]" ]; then
              echo "applies=false" >> "$GITHUB_OUTPUT"
            else
              echo "applies=true" >> "$GITHUB_OUTPUT"
              echo "paths=$paths_json" >> "$GITHUB_OUTPUT"
            fi
          elif [ ! -f package.json ] && [ ! -f pyproject.toml ] && [ ! -f go.mod ] \
               && [ ! -f Cargo.toml ] && find . -name "*.sh" -not -path "./.git/*" | head -1 | grep -q .; then
            echo "applies=true" >> "$GITHUB_OUTPUT"
            echo 'paths=["."]' >> "$GITHUB_OUTPUT"
          else
            echo "applies=false" >> "$GITHUB_OUTPUT"
          fi
  ci:
    needs: detect
    if: needs.detect.outputs.applies == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            sum.golang.org:443
            storage.googleapis.com:443
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
          # Need history back to the PR base for `git diff` in the
          # "Compute changed shell files" step. fetch-depth: 0 is the
          # conventional way to ensure the merge-base is reachable.
          fetch-depth: 0
      - name: Install shfmt
        run: |
          go install mvdan.cc/sh/v3/cmd/shfmt@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      # Compute the list of .sh files changed in this PR. On push events
      # (no PR base SHA), CHANGED_SHELL_FILES_ALL stays empty and the script
      # falls back to its full-tree scan — the baseline enforcement on main.
      #
      # Why this exists: previously, ci-shell.sh ran shfmt/shellcheck over
      # `find . -name "*.sh"`, so a docs-only PR could fail because of
      # pre-existing drift in an unrelated script (see PR #66 → #67).
      - name: Compute changed shell files (PR scope)
        id: changed
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # --diff-filter=ACMR: Added / Copied / Modified / Renamed. Deleted
          # files don't need linting (they're gone), and Type-changed (T) /
          # Unmerged (U) shouldn't reach this point.
          #
          # No `|| true` here on purpose. `git diff` exits 0 with empty
          # stdout when the PR touches no .sh files (legitimate, common
          # case) — that flows through correctly. The only ways it
          # returns non-zero are real problems: unreachable BASE_SHA,
          # corrupted history, broken fetch-depth assumption. Failing
          # loudly in those cases is the whole point — swallowing them
          # would mask drift on PRs whose gate silently no-op'd.
          # (Tier 2 review I1, PR #68.)
          changed=$(git diff --name-only --diff-filter=ACMR \
            "$BASE_SHA" "$HEAD_SHA" -- '*.sh')
          {
            echo "files<<EOF"
            echo "$changed"
            echo "EOF"
          } >>"$GITHUB_OUTPUT"
      - name: Run ci-shell.sh per stack path
        # Pass paths via env: rather than ${{ }} interpolation. Script-injection
        # safety per PR #56 review lesson. Same rule applies to
        # CHANGED_SHELL_FILES_ALL — it's wired through env, never interpolated
        # into the run: body.
        env:
          PATHS_JSON: ${{ needs.detect.outputs.paths }}
          CHANGED_SHELL_FILES_ALL: ${{ steps.changed.outputs.files }}
        run: |
          set -uo pipefail
          mapfile -t PATHS < <(jq -r '.[]' <<<"$PATHS_JSON")
          if [ "${#PATHS[@]}" -eq 0 ]; then
            echo "::error::ci-shell: paths output was empty after parse — refusing to silently skip"
            exit 1
          fi
          FAILED=()
          for p in "${PATHS[@]}"; do
            echo "::group::ci-shell.sh at $p"
            # Re-scope the changed-files list to this stack path. The script
            # itself runs with cwd=$p, so file paths must be relative to $p.
            # On push events CHANGED_SHELL_FILES_ALL is empty and the env
            # var we export is also empty → script falls back to full scan.
            if [ -n "$CHANGED_SHELL_FILES_ALL" ] && [ "$p" != "." ]; then
              scoped=$(echo "$CHANGED_SHELL_FILES_ALL" | awk -v prefix="$p/" '
                index($0, prefix) == 1 { print substr($0, length(prefix) + 1) }
              ')
            else
              scoped="$CHANGED_SHELL_FILES_ALL"
            fi
            if (cd "$p" && CHANGED_SHELL_FILES="$scoped" \
                bash "$GITHUB_WORKSPACE/.github/scripts/ci-shell.sh"); then
              echo "::endgroup::"
            else
              echo "::endgroup::"
              echo "::error::ci-shell.sh failed at path: $p"
              FAILED+=("$p")
            fi
          done
          if [ "${#FAILED[@]}" -gt 0 ]; then
            echo "::error::ci-shell failed at ${#FAILED[@]} path(s): ${FAILED[*]}"
            exit 1
          fi

name: pin-actions
on:
  pull_request:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  pin-actions:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - name: Verify all uses are SHA-pinned (slsa-framework excepted)
        run: |
          set -euo pipefail
          BAD=$(grep -rE '^\s*-?\s*uses:\s+[^@]+@(v[0-9]|main|master|latest)' .github/workflows/ \
            | grep -vE 'slsa-framework/' || true)
          if [ -n "$BAD" ]; then
            echo "::error::Found tag-pinned actions (must be SHA-pinned per spec):"
            echo "$BAD"
            exit 1
          fi
          echo "All actions SHA-pinned (slsa-framework excepted per spec v0.5 §4.6)."

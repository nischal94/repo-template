name: gitleaks
# pull_request only — no `push: branches: [main]` trigger. The ruleset
# forbids direct pushes to main except by bypass actors (App + Dependabot),
# so every code change reaches main via a merged PR that already ran
# gitleaks. The dropped push trigger eliminated ~2 redundant runs per
# merge. App/Dependabot commits to main (e.g. state-file updates from
# enforce-on-poll) are out of scope for secret scanning — they touch
# data files, not code.
on:
  pull_request:
permissions:
  contents: read
  pull-requests: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

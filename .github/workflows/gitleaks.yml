name: gitleaks
# pull_request only — no `push: branches: [main]` trigger. The ruleset's
# `pull_request` rule blocks direct pushes to main. The only bypass
# actor is the policy App (state-file commits via Contents API); it
# writes data only, no code/manifests — out of scope for secret
# scanning. Dependabot is NOT a bypass actor: its auto-merges go
# through the standard PR flow and gitleaks fires at PR time before
# the auto-merge can complete. Dropping the post-merge re-run
# eliminated ~2 redundant runs per merged PR. (Tier 2 review NIT 1
# on PR #73.)
on:
  pull_request:
permissions:
  contents: read
  pull-requests: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
